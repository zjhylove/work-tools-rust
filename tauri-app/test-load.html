<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>测试组件加载</title>
</head>
<body>
  <div id="root"></div>
  <script type="module">
    // 测试动态导入
    async function testLoad() {
      try {
        console.log('开始测试加载 PasswordManagerReact...');
        const module = await import('./src/components/PasswordManagerReact.tsx');
        console.log('模块加载成功:', module);
        console.log('默认导出:', module.default);

        console.log('\n开始测试加载 AuthPluginReact...');
        const authModule = await import('./src/components/AuthPluginReact.tsx');
        console.log('模块加载成功:', authModule);
        console.log('默认导出:', authModule.default);

        alert('✅ 组件加载成功!请查看控制台');
      } catch (error) {
        console.error('❌ 加载失败:', error);
        alert('❌ 加载失败: ' + error.message);
      }
    }

    testLoad();
  </script>
</body>
</html>
