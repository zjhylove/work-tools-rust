name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS - Apple Silicon
          - platform: 'macos-latest'
            os: 'macos-arm'
            target: 'aarch64-apple-darwin'
            ext: 'dmg'

          # Windows - x64
          - platform: 'windows-latest'
            os: 'windows'
            target: 'x86_64-pc-windows-msvc'
            ext: 'msi'

          # Linux - x64
          - platform: 'ubuntu-latest'
            os: 'linux'
            target: 'x86_64-unknown-linux-gnu'
            ext: 'deb'

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: ${{ matrix.target }}
          cache: true

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: tauri-app/package-lock.json

      - name: Install dependencies (Ubuntu)
        if: matrix.os == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev \
            build-essential curl wget file libssl-dev \
            libayatana-appindicator3-dev librsvg2-dev

      - name: Install frontend dependencies
        working-directory: tauri-app
        run: npm ci

      - name: Install plugin frontend dependencies
        run: |
          for dir in plugins/*/frontend; do
            if [ -f "$dir/package.json" ]; then
              echo "Installing deps for $dir"
              cd "$dir"
              npm ci
              cd -
            fi
          done
        shell: bash

      - name: Build Rust workspace (plugins + tauri)
        run: cargo build --release

      - name: Package plugins (macOS/Linux)
        if: matrix.os != 'windows'
        run: bash scripts/build-plugins.sh
        shell: bash
        env:
          PKG_PLATFORM: ${{ matrix.os }}

      - name: Package plugins (Windows)
        if: matrix.os == 'windows'
        run: pwsh scripts/build-plugins.ps1
        shell: pwsh
        env:
          PKG_PLATFORM: ${{ matrix.os }}

      - name: Bundle plugins into single zip (macOS/Linux)
        if: matrix.os != 'windows'
        run: |
          mkdir -p target/release/bundle
          find plugins -name "*.wtplugin.zip" | zip -j "target/release/bundle/plugins-${{ matrix.os }}.zip" -@
        shell: bash

      - name: Bundle plugins into single zip (Windows)
        if: matrix.os == 'windows'
        run: |
          New-Item -ItemType Directory -Force -Path target/release/bundle
          Get-ChildItem -Path plugins -Recurse -Filter "*.wtplugin.zip" | Compress-Archive -DestinationPath "target/release/bundle/plugins-${{ matrix.os }}.zip"
        shell: pwsh

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: tauri-app

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: work-tools-${{ matrix.os }}-${{ matrix.target }}
          path: |
            target/release/bundle/*/
            target/release/bundle/plugins-*.zip
          retention-days: 14

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure of downloaded files
        run: ls -R artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.msi
            artifacts/**/*.exe
            artifacts/**/*.deb
            artifacts/**/*.AppImage
            artifacts/**/plugins-*.zip
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
